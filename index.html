<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ AURA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a1a;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100%;
    width: 100%;
  }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    z-index: 1;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
    padding: 16px;
    text-align: center;
  }
  #level-display {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #score-display {
    color: #fff;
    font-size: 32px;
    font-weight: 200;
    margin-top: 4px;
    text-shadow: 0 0 15px rgba(255,255,255,0.4);
  }
  #combo-display {
    color: #ff6bca;
    font-size: 16px;
    font-weight: 300;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.25s;
    text-shadow: 0 0 12px rgba(255,107,202,0.6);
  }
  #combo-display.visible { opacity: 1; }
  
  #menu, #gameover {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
    transition: opacity 0.6s, visibility 0.6s;
  }
  #menu.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #gameover { opacity: 0; visibility: hidden; pointer-events: none; }
  #gameover.visible { opacity: 1; visibility: visible; pointer-events: all; }
  
  h1 { font-size: 64px; font-weight: 100; color: #fff; letter-spacing: 16px; text-shadow: 0 0 40px rgba(255,255,255,0.4); margin: 0; }
  .subtitle { color: rgba(255,255,255,0.35); font-size: 12px; letter-spacing: 4px; margin-top: 8px; text-transform: uppercase; }
  .btn {
    margin-top: 50px;
    padding: 14px 42px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
    z-index: 25;
    position: relative;
  }
  .btn:active { background: rgba(255,255,255,0.12); transform: scale(0.96); }
  .stats { margin-top: 32px; color: rgba(255,255,255,0.25); font-size: 11px; letter-spacing: 2px; }
  
  #instructions {
    position: fixed;
    bottom: 32px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 10;
    animation: fadeOut 4s ease-in-out 1.5s forwards;
  }
  @keyframes fadeOut { to { opacity: 0; } }
  
  #debug-input {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: #888;
    font-size: 10px;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  <div id="level-display">NIVEL 1</div>
  <div id="score-display">0</div>
  <div id="combo-display">COMBO x2</div>
</div>

<div id="menu">
  <h1>AURA</h1>
  <div class="subtitle">tu rastro es tu camino</div>
  <button class="btn" id="startBtn">COMENZAR</button>
  <div class="stats" id="bestScore">MEJOR: 0</div>
</div>

<div id="gameover">
  <h2 style="font-size:38px; font-weight:100; color:#ff6b6b; letter-spacing:8px; text-shadow:0 0 20px rgba(255,107,107,0.4);">AURA ROTA</h2>
  <div id="finalScore" style="font-size:56px; font-weight:200; color:#fff; margin-top:16px; text-shadow:0 0 20px rgba(255,255,255,0.3);">0</div>
  <div style="color:rgba(255,255,255,0.35); margin-top:6px; font-size:12px; letter-spacing:2px;" id="finalLevel">Nivel 1</div>
  <button class="btn" id="retryBtn">REINTENTAR</button>
</div>

<div id="instructions">MANTÉN PRESIONADO Y ARRASTRA PARA GUIAR LA BOLA</div>
<div id="debug-input">INPUT: INACTIVO</div>

<script>
(function() {
  'use strict';
  
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  const debugEl = document.getElementById('debug-input');
  let W = 800, H = 600, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // AUDIO
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch(e) { console.log('Audio no disponible'); }
    }
  }
  function playTone(freq, dur, type='sine', vol=0.08) {
    if (!audioCtx) return;
    try {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  const SFX = {
    collect: () => { playTone(523, 0.12); setTimeout(()=>playTone(659, 0.12), 40); setTimeout(()=>playTone(784, 0.18, 'sine', 0.06), 80); },
    death: () => { playTone(220, 0.4, 'sawtooth', 0.09); playTone(160, 0.5, 'sine', 0.07); },
    levelUp: () => { [440,554,659,880].forEach((f,i)=>setTimeout(()=>playTone(f, 0.15, 'sine', 0.07), i*70)); },
    pulse: () => playTone(310, 0.06, 'sine', 0.03)
  };

  // GAME STATE
  const game = {
    state: 'menu',
    level: 1, score: 0, combo: 0, comboTimer: 0,
    bestScore: parseInt(localStorage.getItem('aura_best') || '0'),
    levelTrans: 0, shake: 0, slowMo: 1,
    hue: 220, hueTarget: 220
  };
  document.getElementById('bestScore').textContent = `MEJOR: ${game.bestScore}`;

  // PLAYER
  const player = {
    x: W * 0.5, y: H * 0.3, vx: 0, vy: 0, r: 11,
    trail: [], maxTrail: 70, alive: true,
    phase: 0, glow: 1
  };

  // ENTITIES
  let stars = [], obstacles = [], platforms = [], particles = [], bgP = [], trailSegs = [];

  // INPUT
  const input = { active: false, x: 0, y: 0 };

  function handleStart(x,y) {
    initAudio();
    input.active = true;
    input.x = x;
    input.y = y;
    if(game.state==='playing') SFX.pulse();
    debugEl.textContent = 'INPUT: ACTIVO (' + x.toFixed(0) + ',' + y.toFixed(0) + ')';
    debugEl.style.color = '#0f0';
  }
  
  function handleMove(x,y) {
    if(input.active) {
      input.x = x;
      input.y = y;
      debugEl.textContent = 'INPUT: MOVIENDO (' + x.toFixed(0) + ',' + y.toFixed(0) + ')';
    }
  }
  
  function handleEnd() {
    input.active = false;
    debugEl.textContent = 'INPUT: INACTIVO';
    debugEl.style.color = '#888';
  }

  canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  canvas.addEventListener('touchend', e => { e.preventDefault(); handleEnd(); }, {passive:false});
  
  canvas.addEventListener('mousedown', e => { e.preventDefault(); handleStart(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', e => { e.preventDefault(); handleMove(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup', e => { e.preventDefault(); handleEnd(); });
  canvas.addEventListener('mouseleave', e => { handleEnd(); });

  // GENERATION
  function genLevel(lvl) {
    stars = []; obstacles = []; platforms = []; particles = []; trailSegs = [];
    player.x = W * 0.5; player.y = H * 0.3;
    player.vx = 0; player.vy = 0; player.trail = []; player.alive = true; player.glow = 1;
    game.level = lvl; game.combo = 0; game.comboTimer = 0;
    game.state = 'playing'; game.levelTrans = 0;
    game.hueTarget = (220 + lvl * 17) % 360;

    const diff = Math.min(lvl, 45);
    const nStars = 3 + Math.floor(diff * 0.7);
    const nObs = Math.floor(diff * 0.5);
    const nPlat = Math.floor(diff * 0.3);

    for(let i=0; i<nStars; i++) stars.push({ x: 50+Math.random()*(W-100), y: 60+Math.random()*(H*0.6), r: 9+Math.random()*5, col:false, anim:0, ph:Math.random()*6.28, spd:1.2+Math.random() });
    for(let i=0; i<nObs; i++) {
      const mov = Math.random() < 0.5;
      obstacles.push({
        x: Math.random()*W, y: 50+Math.random()*(H*0.65),
        w: 35+Math.random()*70, h: 8+Math.random()*12,
        type: mov ? 'mov' : 'stat',
        spdX: mov ? (Math.random()-0.5)*(1+diff*0.04) : 0,
        spdY: mov ? (Math.random()-0.5)*0.4 : 0,
        ph: Math.random()*6.28, rot: Math.random()*Math.PI, rotSpd: mov?0:(Math.random()-0.5)*0.015*(1+diff*0.02)
      });
    }
    for(let i=0; i<nPlat; i++) platforms.push({ x: 40+Math.random()*(W-80), y: 90+Math.random()*(H*0.45), w: 45+Math.random()*75, h: 5, a: 0.25 });

    document.getElementById('level-display').textContent = `NIVEL ${lvl}`;
  }

  // PHYSICS - FIX: Fuerza mucho más fuerte
  function update(dt) {
    if (game.state !== 'playing') return;
    const s = dt * game.slowMo;

    player.phase += s * 2.8;
    
    // FIX: Gravedad reducida de 600 a 450
    player.vy += 450 * s;

    if (input.active) {
      const dx = input.x - player.x;
      const dy = input.y - player.y;
      const d = Math.hypot(dx, dy);
      if (d > 4) {
        // FIX: Fuerza aumentada de 1.8 a 5.0 y max de 550 a 1200
        const f = Math.min(d * 5.0, 1200);
        player.vx += (dx/d) * f * s;
        // FIX: Sin multiplicador 0.35 en Y - atrae igual en todas direcciones
        player.vy += (dy/d) * f * s;
      }
    }

    // FIX: Más resistencia al aire para controlar mejor
    player.vx *= 0.95; 
    player.vy *= 0.98;
    
    const spd = Math.hypot(player.vx, player.vy);
    if (spd > 600) { player.vx = (player.vx/spd)*600; player.vy = (player.vy/spd)*600; }

    player.x += player.vx * s; player.y += player.vy * s;

    player.trail.unshift({x: player.x, y: player.y, t: 0});
    if (player.trail.length > player.maxTrail) player.trail.pop();
    for(let p of player.trail) p.t += s;

    if (player.x < player.r) { player.x = player.r; player.vx *= -0.5; }
    if (player.x > W - player.r) { player.x = W - player.r; player.vx *= -0.5; }
    if (player.y < player.r) { player.y = player.r; player.vy *= -0.5; }
    if (player.y > H + 60) kill();

    trailSegs = [];
    for(let i=0; i<player.trail.length-2; i+=3) {
      const p1 = player.trail[i], p2 = player.trail[i+3] || player.trail[player.trail.length-1];
      if (p1.t > 1.4) {
        const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
        const len = Math.hypot(p2.x-p1.x, p2.y-p1.y) + 6;
        trailSegs.push({x: mx, y: my, w: len, h: 5, a: Math.max(0, 1 - p1.t/7)});
        if (Math.abs(player.y - my) < 15 && Math.abs(player.x - mx) < len/2 && player.vy > 0) {
          player.y = my - 3 - player.r;
          player.vy = -player.vy * 0.65;
          player.glow = Math.min(player.glow + 0.3, 2);
        }
      }
    }
    for(let p of platforms) {
      if (Math.abs(player.y - p.y) < 12 && Math.abs(player.x - p.x) < p.w/2 && player.vy > 0) {
        player.y = p.y - 3 - player.r;
        player.vy = -player.vy * 0.7;
        player.glow = Math.min(player.glow + 0.2, 1.8);
      }
    }

    for(let o of obstacles) {
      let ox = o.x, oy = o.y;
      if (o.type === 'mov') { o.ph += s*2; ox += Math.sin(o.ph)*o.spdX*45; oy += Math.cos(o.ph)*o.spdY*25; }
      else o.rot += o.rotSpd;
      if (Math.abs(player.x - ox) < (o.w/2 + player.r) && Math.abs(player.y - oy) < (o.h/2 + player.r)) kill();
    }

    let allCol = true;
    for(let s of stars) {
      if (s.col) { if(s.anim>0) s.anim -= 0.04; continue; }
      allCol = false; s.ph += s.spd * s;
      if (Math.hypot(player.x - s.x, player.y - s.y) < player.r + s.r) {
        s.col = true; s.anim = 1;
        game.combo++; game.comboTimer = 1.8;
        const mul = Math.min(game.combo, 10);
        game.score += 100 * mul;
        SFX.collect();
        spawnP(s.x, s.y, 12, game.hue + 20, 3.5);
        game.shake = 4;
        document.getElementById('score-display').textContent = game.score;
        const cEl = document.getElementById('combo-display');
        if(game.combo > 1) { cEl.textContent = `COMBO x${game.combo}`; cEl.classList.add('visible'); }
      }
    }
    if (game.comboTimer > 0) { game.comboTimer -= dt; if(game.comboTimer <= 0) { game.combo = 0; document.getElementById('combo-display').classList.remove('visible'); } }

    if (allCol && game.state === 'playing') {
      game.state = 'transition'; game.levelTrans = 1; SFX.levelUp();
      for(let i=0; i<40; i++) setTimeout(()=>spawnP(Math.random()*W, Math.random()*H, 2, Math.random()*360, 4), i*25);
      setTimeout(()=>genLevel(game.level + 1), 1200);
    }

    player.glow = Math.max(1, player.glow - dt * 0.6);
    game.hue += (game.hueTarget - game.hue) * dt * 0.4;
  }

  function kill() {
    if (!player.alive) return; player.alive = false;
    game.shake = 12; game.slowMo = 0.25; SFX.death();
    spawnP(player.x, player.y, 35, game.hue, 5);
    spawnP(player.x, player.y, 18, 0, 3.5);
    if (game.score > game.bestScore) { game.bestScore = game.score; localStorage.setItem('aura_best', game.bestScore); }
    setTimeout(() => {
      game.state = 'dead'; game.slowMo = 1;
      document.getElementById('finalScore').textContent = game.score;
      document.getElementById('finalLevel').textContent = `Nivel ${game.level}`;
      document.getElementById('gameover').classList.add('visible');
    }, 800);
  }

  function spawnP(x,y,n,hue,spd) {
    for(let i=0; i<n; i++) {
      const a = Math.random()*Math.PI*2, v = Math.random()*spd;
      particles.push({x,y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:1, dec:0.015+Math.random()*0.02, r:1+Math.random()*2.5, h:hue});
    }
  }
  function initBg() { bgP = []; for(let i=0;i<35;i++) bgP.push({x:Math.random()*W, y:Math.random()*H, r:0.8+Math.random()*1.5, a:0.1+Math.random()*0.25, vx:(Math.random()-0.5)*0.25, vy:-0.08-Math.random()*0.3, ph:Math.random()*6.28}); }
  initBg();

  function updateP(dt) {
    for(let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 45*dt; p.life -= p.dec;
      if(p.life <= 0) particles.splice(i, 1);
    }
    for(let p of bgP) {
      p.x += p.vx; p.y += p.vy; p.ph += dt*1.5;
      if(p.y < -10) { p.y = H+10; p.x = Math.random()*W; }
      if(p.x < -10 || p.x > W+10) p.x = (p.x<0?W+10:-10);
    }
  }

  function rr(ctx, x,y,w,h,r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  function render() {
    ctx.save();
    if(game.shake > 0) { ctx.translate((Math.random()-0.5)*game.shake, (Math.random()-0.5)*game.shake); game.shake *= 0.88; if(game.shake<0.1) game.shake=0; }

    if (!isFinite(W) || !isFinite(H) || W <= 0 || H <= 0) {
      W = window.innerWidth || 800;
      H = window.innerHeight || 600;
    }

    const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.85);
    bg.addColorStop(0, `hsl(${game.hue},25%,7%)`); bg.addColorStop(1, `hsl(${(game.hue+35)%360},18%,2.5%)`);
    ctx.fillStyle = bg; ctx.fillRect(-20,-20,W+40,H+40);

    ctx.strokeStyle = `hsla(${game.hue},25%,35%,0.04)`; ctx.lineWidth=1;
    for(let x=0;x<W;x+=55){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=55){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    if(game.state!=='menu') {
      for(let p of bgP){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.a*(0.4+0.6*Math.sin(p.ph))})`;ctx.fill();}

      for(let p of platforms){ctx.save();ctx.translate(p.x,p.y);ctx.fillStyle=`rgba(255,255,255,${p.a})`;rr(ctx,-p.w/2,-p.h/2,p.w,p.h,2.5);ctx.fill();ctx.restore();}

      for(let o of obstacles){ctx.save();let ox=o.x, oy=o.y; if(o.type==='mov'){ox+=Math.sin(o.ph)*o.spdX*45; oy+=Math.cos(o.ph)*o.spdY*25;} else ctx.rotate(o.rot);
        ctx.translate(ox,oy);ctx.fillStyle='rgba(255,65,65,0.65)';ctx.shadowColor='rgba(255,65,65,0.7)';ctx.shadowBlur=14;rr(ctx,-o.w/2,-o.h/2,o.w,o.h,4);ctx.fill();
        ctx.fillStyle='rgba(255,110,110,0.25)';rr(ctx,-o.w/2+2,-o.h/2+2,o.w-4,o.h-4,3);ctx.fill();ctx.restore();}

      if(player.trail.length>1 && player.alive){
        for(let i=1;i<player.trail.length;i++){
          const p1=player.trail[i-1], p2=player.trail[i], age=p1.t, al=Math.max(0,1-age/7);
          const solid = age>1.4;
          ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
          ctx.strokeStyle = solid ? `hsla(${game.hue+20},65%,65%,${al*0.55})` : `hsla(${game.hue},55%,75%,${al*0.35})`;
          ctx.lineWidth = solid ? 5*al : 3*al;
          ctx.shadowColor = solid ? `hsla(${game.hue+20},75%,60%,${al*0.7})` : 'transparent';
          ctx.shadowBlur = solid ? 12*al : 0;
          ctx.stroke(); ctx.shadowBlur=0;
        }
      }

      for(let s of stars){
        if(s.col){if(s.anim>0){s.anim-=0.03;ctx.beginPath();ctx.arc(s.x,s.y,s.r*(1+(1-s.anim)*2.5),0,Math.PI*2);ctx.fillStyle=`hsla(${game.hue+20},75%,65%,${s.anim})`;ctx.fill();}continue;}
        const pu = 0.75+0.25*Math.sin(s.ph);
        ctx.beginPath();ctx.arc(s.x,s.y,s.r*2.5*pu,0,Math.PI*2);ctx.fillStyle=`hsla(${game.hue+20},75%,55%,0.08)`;ctx.fill();
        
        if (isFinite(s.x) && isFinite(s.y) && isFinite(s.r * pu)) {
          ctx.beginPath();ctx.arc(s.x,s.y,s.r*pu,0,Math.PI*2);
          const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*pu);
          sg.addColorStop(0,`hsla(${game.hue+20},85%,90%,0.95)`);sg.addColorStop(1,`hsla(${game.hue+20},70%,50%,0)`);
          ctx.fillStyle=sg;ctx.shadowColor=`hsla(${game.hue+20},75%,60%,0.8)`;ctx.shadowBlur=18;ctx.fill();ctx.shadowBlur=0;
          ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.ph*0.4);ctx.beginPath();ctx.moveTo(0,-s.r*0.55);ctx.lineTo(s.r*0.35,0);ctx.lineTo(0,s.r*0.55);ctx.lineTo(-s.r*0.35,0);ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fill();ctx.restore();
        }
      }

      if(player.alive && isFinite(player.x) && isFinite(player.y)){
        const pu=1+0.09*Math.sin(player.phase), r=player.r*pu;
        const ar=r*3.8*player.glow;
        
        ctx.beginPath();ctx.arc(player.x,player.y,ar,0,Math.PI*2);
        const ag=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,ar);
        ag.addColorStop(0,`hsla(${game.hue},55%,75%,0.18)`);ag.addColorStop(1,'transparent');
        ctx.fillStyle=ag;ctx.fill();
        ctx.beginPath();ctx.arc(player.x,player.y,r,0,Math.PI*2);
        const pg=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,r);
        pg.addColorStop(0,'#ffffff');pg.addColorStop(0.35,`hsl(${game.hue},55%,88%)`);pg.addColorStop(1,`hsl(${game.hue},65%,60%)`);
        ctx.fillStyle=pg;ctx.shadowColor=`hsl(${game.hue},75%,65%)`;ctx.shadowBlur=28*player.glow;ctx.fill();ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(player.x-r*0.18,player.y-r*0.18,r*0.32,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.75)';ctx.fill();
      }

      if(game.state==='transition' && game.levelTrans>0){
        game.levelTrans -= 0.018;
        ctx.fillStyle=`rgba(255,255,255,${game.levelTrans*0.25})`;ctx.fillRect(-20,-20,W+40,H+40);
        ctx.save();ctx.globalAlpha=game.levelTrans;ctx.fillStyle='#fff';ctx.font=`200 30px system-ui,sans-serif`;ctx.textAlign='center';ctx.shadowColor=`hsl(${game.hue},70%,60%)`;ctx.shadowBlur=15;
        ctx.fillText(`NIVEL ${game.level} COMPLETO`, W/2, H/2); ctx.restore();
      }

      for(let p of particles){
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.h},75%,65%,${p.life})`;ctx.fill();
      }

      const vig=ctx.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.9);
      vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.45)');
      ctx.fillStyle=vig;ctx.fillRect(-20,-20,W+40,H+40);
    }
    ctx.restore();
  }

  let last=0, hidden=false;
  function loop(t){
    const dt = Math.min((t-last)/1000, 0.045); last=t;
    if(!hidden){
      if(game.state==='playing') update(dt);
      updateP(dt);
      if(game.slowMo<1){game.slowMo+=dt*0.6; if(game.slowMo>1)game.slowMo=1;}
      render();
    }
    requestAnimationFrame(loop);
  }
  document.addEventListener('visibilitychange', ()=>{hidden=document.hidden;});
  requestAnimationFrame(loop);

  document.getElementById('startBtn').addEventListener('click', ()=>{
    game.state='playing';
    game.score=0;
    document.getElementById('score-display').textContent='0';
    document.getElementById('menu').classList.add('hidden');
    genLevel(1);
  });
  
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    game.state='playing';
    game.score=0;
    document.getElementById('score-display').textContent='0';
    document.getElementById('combo-display').classList.remove('visible');
    document.getElementById('gameover').classList.remove('visible');
    genLevel(1);
  });
})();
</script>
</body>
</html>
