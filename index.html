<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ AURA: REBIRTH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #050508;
    overflow: hidden;
    touch-action: none;
    font-family: 'Outfit', sans-serif;
    height: 100%;
    width: 100%;
    color: #fff;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    filter: contrast(1.1) brightness(1.2);
  }

  /* UI MODERNA (Glassmorphism) */
  #ui-layer {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
  }

  .top-hud {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .glass-panel {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .hud-text { font-size: 11px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; }
  .hud-val { font-size: 18px; font-weight: 400; letter-spacing: 0.5px; }
  
  #rank-display { color: #00f3ff; text-shadow: 0 0 8px rgba(0,243,255,0.5); }
  #score-display { color: #fff; text-align: right; }

  .progress-track {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.05);
  }
  #progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f3ff, #bd00ff);
    box-shadow: 0 0 10px #bd00ff;
    transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* MENUS */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: radial-gradient(circle at center, #12121a 0%, #050508 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s, transform 0.6s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

  h1 {
    font-size: 72px;
    font-weight: 200;
    letter-spacing: -2px;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 0%, #88aaff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  h1 span { font-weight: 600; }

  .lore-text {
    max-width: 400px;
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    line-height: 1.6;
    margin: 20px 0 40px;
    font-style: italic;
  }

  .btn-main {
    pointer-events: all;
    padding: 16px 48px;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    color: #fff;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(5px);
    position: relative;
    overflow: hidden;
  }
  .btn-main:hover {
    background: rgba(255,255,255,0.15);
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,243,255,0.2);
  }
  .btn-main:active { transform: scale(0.95); }

  .btn-sub {
    margin-top: 15px;
    pointer-events: all;
    color: rgba(255,255,255,0.4);
    background: none;
    border: none;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .btn-sub:hover { color: #fff; }

  /* ECHO POPUP (Lore) */
  #echo-popup {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px 24px;
    border-radius: 8px;
    color: #bd00ff;
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0;
    transition: opacity 0.5s, transform 0.5s;
    z-index: 15;
    text-align: center;
    width: 80%;
    max-width: 350px;
    backdrop-filter: blur(10px);
  }
  #echo-popup.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="game"></canvas>

<!-- UI HUD -->
<div id="ui-layer">
  <div class="top-hud">
    <div class="glass-panel">
      <span class="hud-text">RANGO</span>
      <span class="hud-val" id="rank-display">DESPIERTO</span>
    </div>
    <div class="glass-panel" style="align-items: flex-end;">
      <span class="hud-text">NIVEL</span>
      <span class="hud-val" id="level-display">1</span>
    </div>
  </div>
  <div class="glass-panel" style="align-self: center; align-items: center; min-width: 120px;">
    <span class="hud-val" id="score-display" style="font-size: 24px;">0</span>
  </div>
  <div class="progress-track">
    <div id="progress-fill"></div>
  </div>
</div>

<!-- LORE POPUP -->
<div id="echo-popup">"Eco desbloqueado..."</div>

<!-- MAIN MENU -->
<div id="menu-screen" class="screen">
  <h1>AURA <span>:REBIRTH</span></h1>
  <p class="lore-text" id="menu-lore">"Eres la última chispa. El universo se apaga, pero si recolectas las memorias perdidas, puedes encenderlo de nuevo."</p>
  <button class="btn-main" id="btn-start">INICIAR VIAJE</button>
  <button class="btn-sub" id="btn-stats">VER PROGRESO</button>
</div>

<!-- GAME OVER -->
<div id="death-screen" class="screen hidden">
  <h2 style="font-size: 32px; font-weight: 200; color: #ff3366; letter-spacing: 4px;">ENTROPÍA</h2>
  <p style="color: rgba(255,255,255,0.4); margin: 10px 0 30px;">La luz se ha extinguido.</p>
  <div style="font-size: 48px; font-weight: 200; margin-bottom: 10px;" id="final-score">0</div>
  <button class="btn-main" id="btn-retry">REINTENTAR</button>
</div>

<script>
/**
 * AURA: REBIRTH
 * Engine optimizado para máximo rendimiento visual y mecánicas avanzadas.
 */

// --- CONFIGURACIÓN GLOBAL ---
const CONFIG = {
  colors: {
    player: '#ffffff',
    trail: '#00f3ff',
    trailGlow: '#bd00ff',
    enemy: '#ff3366',
    star: '#ffd700',
    bg: '#050508'
  },
  ranks: [
    { lvl: 0, name: 'DESPIERTO', color: '#888' },
    { lvl: 3, name: 'ESPERANZA', color: '#00f3ff' },
    { lvl: 8, name: 'GUARDIÁN', color: '#bd00ff' },
    { lvl: 15, name: 'FÉNIX', color: '#ffaa00' },
    { lvl: 25, name: 'CREADOR', color: '#fff' }
  ],
  echoes: [
    { lvl: 1, text: " 'Recuerdo un mundo lleno de luz...'" },
    { lvl: 4, text: "🔮 'La Entropía nos consumió, pero yo sigo aquí.'" },
    { lvl: 8, text: "🔮 'Cada estrella es un alma que salvé.'" },
    { lvl: 12, text: "🔮 'El vacío tiene miedo de mi brillo.'" },
    { lvl: 18, text: "🔮 'Estoy reconstruyendo el tejido del espacio.'" },
    { lvl: 25, text: "🔮 'He vuelto a ser el universo entero.'" }
  ]
};

// --- ESTADO DEL JUEGO ---
const Game = {
  state: 'menu', // menu, playing, dead, transition
  level: 1,
  score: 0,
  bestScore: parseInt(localStorage.getItem('aura_best') || '0'),
  totalStarsCollected: parseInt(localStorage.getItem('aura_stars') || '0'),
  maxLevel: parseInt(localStorage.getItem('aura_max') || '0'),
  entities: [],
  particles: [],
  trailPoints: [],
  shake: { x: 0, y: 0, intensity: 0 },
  input: { active: false, x: 0, y: 0, dx: 0, dy: 0 },
  width: window.innerWidth,
  height: window.innerHeight,
  lastTime: 0,
  slowMo: 1,
  bgHue: 240
};

// --- AUDIO SYNTH ---
const Audio = {
  ctx: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.ctx.state === 'suspended') this.ctx.resume();
    }
  },
  play(type) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain);
    gain.connect(this.ctx.destination);

    if (type === 'collect') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1760, t + 0.1);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    } else if (type === 'kill') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
      osc.start(t); osc.stop(t + 0.2);
    } else if (type === 'death') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(10, t + 1);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.linearRampToValueAtTime(0, t + 1);
      osc.start(t); osc.stop(t + 1);
    } else if (type === 'level') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, t);
      osc.frequency.linearRampToValueAtTime(880, t + 0.1);
      osc.frequency.linearRampToValueAtTime(1100, t + 0.3);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
    }
  }
};

// --- CLASES DE ENTIDADES ---
class Entity {
  constructor(x, y, type) {
    this.x = x;
    this.y = y;
    this.type = type; // 'star', 'enemy'
    this.radius = type === 'star' ? 10 : 8;
    this.life = 1;
    this.pulse = Math.random() * Math.PI;
    this.vx = 0;
    this.vy = 0;
    this.active = true;
  }

  update(dt) {
    this.pulse += dt * 3;
    
    if (this.type === 'enemy') {
      // Seeker logic: move towards player
      const dx = Game.player.x - this.x;
      const dy = Game.player.y - this.y;
      const dist = Math.hypot(dx, dy);
      
      if (dist > 0) {
        this.vx = (dx / dist) * 120 * (1 + Game.level * 0.05);
        this.vy = (dy / dist) * 120 * (1 + Game.level * 0.05);
      }
      
      this.x += this.vx * dt;
      this.y += this.vy * dt;

      // Bounce off walls
      if(this.x < 0 || this.x > Game.width) this.vx *= -1;
      if(this.y < 0 || this.y > Game.height) this.vy *= -1;
      this.x = Math.max(0, Math.min(Game.width, this.x));
      this.y = Math.max(0, Math.min(Game.height, this.y));
    }
  }

  draw(ctx) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    
    if (this.type === 'star') {
      const scale = 1 + Math.sin(this.pulse) * 0.2;
      ctx.translate(this.x, this.y);
      ctx.scale(scale, scale);
      
      // Glow
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius * 3);
      grad.addColorStop(0, 'rgba(255, 215, 0, 0.8)');
      grad.addColorStop(1, 'rgba(255, 215, 0, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius * 3, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
      ctx.fill();
      
      // Shape
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
      ctx.stroke();
    } 
    else if (this.type === 'enemy') {
      ctx.translate(this.x, this.y);
      ctx.rotate(this.pulse);
      
      // Spiky shape
      ctx.fillStyle = '#ff3366';
      ctx.shadowColor = '#ff3366';
      ctx.shadowBlur = 15;
      
      ctx.beginPath();
      for(let i=0; i<4; i++) {
        const angle = (Math.PI/2) * i;
        ctx.lineTo(Math.cos(angle)*this.radius, Math.sin(angle)*this.radius);
        ctx.lineTo(Math.cos(angle + Math.PI/4)*(this.radius*0.4), Math.sin(angle + Math.PI/4)*(this.radius*0.4));
      }
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    ctx.restore();
  }
}

class Particle {
  constructor(x, y, color, speed = 100, life = 1) {
    this.x = x;
    this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const vel = Math.random() * speed;
    this.vx = Math.cos(angle) * vel;
    this.vy = Math.sin(angle) * vel;
    this.life = life;
    this.decay = 0.5 + Math.random();
    this.size = 1 + Math.random() * 3;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= this.decay * dt;
    this.vx *= 0.95;
    this.vy *= 0.95;
  }

  draw(ctx) {
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// --- PLAYER ---
Game.player = {
  x: 0, y: 0, vx: 0, vy: 0,
  radius: 12,
  trail: [],
  maxTrail: 100,
  pulse: 0,
  
  update(dt) {
    this.pulse += dt * 4;
    
    // Physics
    if (Game.input.active) {
      const dx = Game.input.x - this.x;
      const dy = Game.input.y - this.y;
      const dist = Math.hypot(dx, dy);
      
      if (dist > 5) {
        const force = Math.min(dist * 6, 1500);
        this.vx += (dx / dist) * force * dt;
        this.vy += (dy / dist) * force * dt;
      }
    }
    
    // Drag
    this.vx *= 0.92;
    this.vy *= 0.92;
    
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    
    // Trail
    this.trail.unshift({ x: this.x, y: this.y, age: 0 });
    if (this.trail.length > this.maxTrail) this.trail.pop();
    this.trail.forEach(p => p.age += dt);
    
    // Wall collision
    if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.5; }
    if (this.x > Game.width - this.radius) { this.x = Game.width - this.radius; this.vx *= -0.5; }
    if (this.y < this.radius) { this.y = this.radius; this.vy *= -0.5; }
    if (this.y > Game.height + 50) Game.kill();
    
    // Trail collision (Solidify after 1.2s)
    this.checkTrailCollision();
  },
  
  checkTrailCollision() {
    for (let i = 20; i < this.trail.length; i += 4) {
      const p = this.trail[i];
      if (p.age > 1.2) {
        const dist = Math.hypot(this.x - p.x, this.y - p.y);
        if (dist < this.radius + 5 && this.vy > 0 && this.y < p.y) {
          this.y = p.y - this.radius - 2;
          this.vy *= -0.6;
          this.vx *= 0.8;
          Game.addShake(2);
          Audio.play('collect'); // Bounce sound reuse
          
          // Sparkles
          for(let k=0; k<3; k++) {
            Game.particles.push(new Particle(this.x, this.y + this.radius, '#00f3ff', 50, 0.5));
          }
        }
      }
    }
  },
  
  draw(ctx) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    
    // Aura
    const auraSize = this.radius * 4 + Math.sin(this.pulse) * 5;
    const aura = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, auraSize);
    aura.addColorStop(0, 'rgba(0, 243, 255, 0.4)');
    aura.addColorStop(0.5, 'rgba(189, 0, 255, 0.1)');
    aura.addColorStop(1, 'transparent');
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(this.x, this.y, auraSize, 0, Math.PI * 2);
    ctx.fill();
    
    // Core
    const core = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
    core.addColorStop(0, '#ffffff');
    core.addColorStop(0.4, '#ccffff');
    core.addColorStop(1, '#00f3ff');
    ctx.fillStyle = core;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
  },
  
  drawTrail(ctx) {
    if (this.trail.length < 2) return;
    
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = 'lighter';
    
    // Draw segments
    for (let i = 0; i < this.trail.length - 1; i++) {
      const p1 = this.trail[i];
      const p2 = this.trail[i+1];
      
      if (p1.age < 1.2) {
        // Fluid trail
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(0, 243, 255, ${0.4 * (1 - i/this.trail.length)})`;
        ctx.lineWidth = 4;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00f3ff';
        ctx.stroke();
      } else {
        // Solidified trail (Platform)
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(189, 0, 255, ${0.6 * (1 - i/this.trail.length)})`;
        ctx.lineWidth = 8;
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#bd00ff';
        ctx.stroke();
        
        // Inner line
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.3 * (1 - i/this.trail.length)})`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 0;
        ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;
  }
};

// --- GAME LOGIC ---
Game.startLevel = function(lvl) {
  this.level = lvl;
  this.entities = [];
  this.trailPoints = [];
  Game.player.trail = [];
  Game.player.x = Game.width * 0.5;
  Game.player.y = Game.height * 0.3;
  Game.player.vx = 0;
  Game.player.vy = 0;
  
  // Spawn Stars
  const starCount = 3 + Math.floor(lvl * 0.4);
  for(let i=0; i<starCount; i++) {
    this.entities.push(new Entity(
      50 + Math.random() * (Game.width - 100),
      50 + Math.random() * (Game.height * 0.6),
      'star'
    ));
  }
  
  // Spawn Enemies
  const enemyCount = Math.floor(lvl * 0.3);
  for(let i=0; i<enemyCount; i++) {
    const ex = Math.random() * Game.width;
    const ey = Math.random() * (Game.height * 0.5);
    this.entities.push(new Entity(ex, ey, 'enemy'));
  }
  
  this.updateUI();
};

Game.update = function(dt) {
  if (this.state !== 'playing') return;
  
  dt *= this.slowMo;
  if (this.slowMo < 1) this.slowMo += dt * 0.5;
  
  // Shake decay
  if (this.shake.intensity > 0) {
    this.shake.x = (Math.random() - 0.5) * this.shake.intensity;
    this.shake.y = (Math.random() - 0.5) * this.shake.intensity;
    this.shake.intensity *= 0.9;
    if(this.shake.intensity < 0.5) { this.shake.intensity = 0; this.shake.x = 0; this.shake.y = 0; }
  }
  
  Game.player.update(dt);
  
  // Update Entities
  let activeStars = 0;
  
  this.entities.forEach(e => {
    if (!e.active) return;
    e.update(dt);
    
    if (e.type === 'star') {
      activeStars++;
      const dist = Math.hypot(Game.player.x - e.x, Game.player.y - e.y);
      if (dist < Game.player.radius + e.radius) {
        e.active = false;
        this.score += 100 + (this.level * 10);
        Audio.play('collect');
        this.addShake(5);
        
        // Explosion
        for(let i=0; i<15; i++) {
          this.particles.push(new Particle(e.x, e.y, '#ffd700', 200, 1));
        }
        
        // Check level complete
        const remaining = this.entities.filter(ent => ent.type === 'star' && ent.active).length;
        if (remaining === 0) this.levelComplete();
      }
    }
    
    if (e.type === 'enemy') {
      const dist = Math.hypot(Game.player.x - e.x, Game.player.y - e.y);
      
      // Kill player
      if (dist < Game.player.radius + e.radius) {
        this.kill();
      }
      
      // Trail kills enemy
      for (let t of Game.player.trail) {
        if (t.age > 1.2) {
          const tDist = Math.hypot(e.x - t.x, e.y - t.y);
          if (tDist < e.radius + 5) {
            e.active = false;
            Audio.play('kill');
            this.score += 50;
            this.addShake(8);
            // Enemy death explosion
            for(let i=0; i<10; i++) {
              this.particles.push(new Particle(e.x, e.y, '#ff3366', 150, 0.8));
            }
            break;
          }
        }
      }
    }
  });
  
  this.updateUI(activeStars);
};

Game.draw = function(ctx) {
  // Clear
  ctx.fillStyle = CONFIG.colors.bg;
  ctx.fillRect(0, 0, Game.width, Game.height);
  
  // Dynamic Background (Nebula effect)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const bgGrad = ctx.createRadialGradient(Game.width/2, Game.height/2, 0, Game.width/2, Game.height/2, Game.width);
  bgGrad.addColorStop(0, `hsl(${Game.bgHue}, 60%, 5%)`);
  bgGrad.addColorStop(1, `hsl(${Game.bgHue + 40}, 60%, 2%)`);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0, Game.width, Game.height);
  ctx.restore();
  
  // Apply Shake
  ctx.save();
  ctx.translate(this.shake.x, this.shake.y);
  
  // Draw Trail
  Game.player.drawTrail(ctx);
  
  // Draw Entities
  this.entities.forEach(e => { if(e.active) e.draw(ctx); });
  
  // Draw Player
  Game.player.draw(ctx);
  
  // Draw Particles
  this.particles.forEach(p => p.draw(ctx));
  
  ctx.restore();
};

Game.loop = function(timestamp) {
  const dt = Math.min((timestamp - Game.lastTime) / 1000, 0.05);
  Game.lastTime = timestamp;
  
  if (Game.state === 'playing') {
    Game.update(dt);
    Game.draw(ctx);
    
    // Update particles
    for(let i = Game.particles.length - 1; i >= 0; i--) {
      Game.particles[i].update(dt);
      if(Game.particles[i].life <= 0) Game.particles.splice(i, 1);
    }
    
    // Background color shift
    Game.bgHue = 240 + (Game.level * 10) % 60;
  }
  
  requestAnimationFrame(Game.loop);
};

Game.kill = function() {
  Game.state = 'dead';
  Audio.play('death');
  
  // Explosion
  for(let i=0; i<30; i++) {
    Game.particles.push(new Particle(Game.player.x, Game.player.y, '#fff', 300, 1.5));
    Game.particles.push(new Particle(Game.player.x, Game.player.y, '#00f3ff', 200, 1.5));
  }
  
  Game.addShake(20);
  
  if(Game.score > Game.bestScore) Game.bestScore = Game.score;
  if(Game.level > Game.maxLevel) Game.maxLevel = Game.level;
  
  localStorage.setItem('aura_best', Game.bestScore);
  localStorage.setItem('aura_max', Game.maxLevel);
  
  setTimeout(() => {
    document.getElementById('final-score').textContent = Game.score;
    document.getElementById('death-screen').classList.remove('hidden');
  }, 800);
};

Game.levelComplete = function() {
  Game.state = 'transition';
  Audio.play('level');
  
  // Save stats
  Game.totalStarsCollected += Game.entities.length; // Approx
  localStorage.setItem('aura_stars', Game.totalStarsCollected);
  
  // Show Echo (Lore)
  const echo = CONFIG.echoes.find(e => e.lvl === Game.level);
  if(echo) {
    const popup = document.getElementById('echo-popup');
    popup.textContent = echo.text;
    popup.classList.add('visible');
    setTimeout(() => popup.classList.remove('visible'), 3000);
  }
  
  // Transition effect
  let alpha = 0;
  const trans = setInterval(() => {
    alpha += 0.05;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(0,0,Game.width,Game.height);
    if(alpha > 1) {
      clearInterval(trans);
      Game.startLevel(Game.level + 1);
      Game.state = 'playing';
    }
  }, 30);
};

Game.addShake = function(intensity) {
  Game.shake.intensity = intensity;
};

Game.updateUI = function(starsLeft) {
  document.getElementById('score-display').textContent = Game.score;
  document.getElementById('level-display').textContent = Game.level;
  
  // Rank Logic
  let rank = CONFIG.ranks[0];
  for(let r of CONFIG.ranks) {
    if(Game.maxLevel >= r.lvl) rank = r;
  }
  document.getElementById('rank-display').textContent = rank.name;
  document.getElementById('rank-display').style.color = rank.color;
  
  if(starsLeft !== undefined) {
    const total = Game.entities.filter(e => e.type === 'star').length;
    const progress = ((total - starsLeft) / total) * 100;
    document.getElementById('progress-fill').style.width = `${progress}%`;
  }
};

// --- INPUT HANDLING ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });

function resize() {
  Game.width = window.innerWidth;
  Game.height = window.innerHeight;
  canvas.width = Game.width;
  canvas.height = Game.height;
}
window.addEventListener('resize', resize);
resize();

canvas.addEventListener('touchstart', e => { 
  e.preventDefault(); 
  Game.input.active = true; 
  Game.input.x = e.touches[0].clientX; 
  Game.input.y = e.touches[0].clientY; 
  Audio.init();
}, {passive:false});

canvas.addEventListener('touchmove', e => { 
  e.preventDefault(); 
  Game.input.x = e.touches[0].clientX; 
  Game.input.y = e.touches[0].clientY; 
}, {passive:false});

canvas.addEventListener('touchend', e => { 
  e.preventDefault(); 
  Game.input.active = false; 
}, {passive:false});

canvas.addEventListener('mousedown', e => { 
  Game.input.active = true; 
  Game.input.x = e.clientX; 
  Game.input.y = e.clientY; 
  Audio.init();
});
canvas.addEventListener('mousemove', e => { 
  Game.input.x = e.clientX; 
  Game.input.y = e.clientY; 
});
canvas.addEventListener('mouseup', () => { Game.input.active = false; });

// --- BUTTONS ---
document.getElementById('btn-start').addEventListener('click', () => {
  Audio.init();
  Game.score = 0;
  document.getElementById('menu-screen').classList.add('hidden');
  Game.startLevel(1);
  Game.state = 'playing';
});

document.getElementById('btn-retry').addEventListener('click', () => {
  document.getElementById('death-screen').classList.add('hidden');
  Game.score = 0;
  Game.startLevel(Game.level);
  Game.state = 'playing';
});

document.getElementById('btn-stats').addEventListener('click', () => {
  alert(`📊 ESTADÍSTICAS\n\nNivel Máximo: ${Game.maxLevel}\nPuntuación: ${Game.bestScore}\nEstrellas Recolectadas: ${Game.totalStarsCollected}`);
});

// Start Loop
Game.lastTime = performance.now();
requestAnimationFrame(Game.loop);

</script>
