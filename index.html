<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✨ AURA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0a0a1a;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100%;
    width: 100%;
  }
  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
    z-index: 1;
  }
  
  /* UI LAYER */
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ui-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }
  #rank-badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    color: #ffd700;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    backdrop-filter: blur(4px);
  }
  #level-display {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  #timer {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }
  
  #progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    border-radius: 3px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(0,242,254,0.5);
  }
  
  #objective {
    text-align: center;
    color: #fff;
    font-size: 14px;
    font-weight: 300;
    margin-top: 2px;
  }
  #objective span { color: #ffd700; font-weight: 500; }
  
  #combo-display {
    text-align: center;
    color: #ff6bca;
    font-size: 15px;
    font-weight: 400;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    text-shadow: 0 0 10px rgba(255,107,202,0.6);
  }
  #combo-display.visible { opacity: 1; transform: scale(1.05); }

  /* TRAIL HINT */
  #trail-hint {
    position: fixed;
    bottom: 80px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(0,242,254,0.8);
    font-size: 13px;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.5s;
    text-shadow: 0 0 10px rgba(0,242,254,0.5);
  }
  #trail-hint.visible { opacity: 1; }

  /* MENUS */
  #menu, #gameover, #stats-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
    transition: opacity 0.5s, visibility 0.5s;
  }
  #menu.hidden, #stats-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #gameover { opacity: 0; visibility: hidden; pointer-events: none; }
  #gameover.visible { opacity: 1; visibility: visible; pointer-events: all; }
  
  h1 { font-size: 56px; font-weight: 100; color: #fff; letter-spacing: 12px; text-shadow: 0 0 30px rgba(255,255,255,0.4); margin: 0; }
  .subtitle { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 3px; margin-top: 6px; text-transform: uppercase; }
  
  .btn {
    margin-top: 30px;
    padding: 12px 36px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: rgba(255,255,255,0.12); transform: scale(0.96); }
  .btn.secondary { margin-top: 12px; font-size: 11px; color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.08); }
  
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
    max-width: 300px;
  }
  .stat-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-val { font-size: 20px; color: #fff; font-weight: 300; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-top: 4px; }
  
  .rank-title {
    font-size: 18px;
    color: #ffd700;
    margin-top: 16px;
    letter-spacing: 2px;
    text-shadow: 0 0 15px rgba(255,215,0,0.4);
  }
  
  #instructions {
    position: fixed;
    bottom: 20px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.25);
    font-size: 11px;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 10;
    animation: fadeOut 5s ease-in-out 2s forwards;
  }
  @keyframes fadeOut { to { opacity: 0; } }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  <div class="ui-row">
    <div id="rank-badge">NOVATO</div>
    <div id="level-display">NIVEL 1</div>
    <div id="timer">00:00</div>
  </div>
  <div id="progress-container"><div id="progress-bar"></div></div>
  <div id="objective">⭐ <span>0</span> / 5 estrellas</div>
  <div id="combo-display">COMBO x2</div>
</div>

<div id="trail-hint">💫 TU RASTRO SE CONVIERTE EN PLATAFORMA · REBOTA EN ÉL</div>

<div id="menu">
  <h1>AURA</h1>
  <div class="subtitle">tu rastro es tu camino</div>
  <button class="btn" id="startBtn">JUGAR</button>
  <button class="btn secondary" id="statsBtn">VER PROGRESO</button>
  <div id="menu-rank" class="rank-title" style="margin-top:20px;">NOVATO</div>
</div>

<div id="stats-screen" class="hidden">
  <h2 style="font-size:24px; font-weight:200; color:#fff; letter-spacing:6px;">ESTADÍSTICAS</h2>
  <div class="stats-grid" id="stats-content"></div>
  <button class="btn secondary" id="closeStatsBtn" style="margin-top:30px;">VOLVER</button>
</div>

<div id="gameover">
  <h2 style="font-size:32px; font-weight:100; color:#ff6b6b; letter-spacing:6px; text-shadow:0 0 15px rgba(255,107,107,0.4);">AURA ROTA</h2>
  <div id="finalScore" style="font-size:42px; font-weight:200; color:#fff; margin-top:12px;">0</div>
  <div style="color:rgba(255,255,255,0.35); margin-top:4px; font-size:11px;" id="finalMeta">Nivel 1 · 00:00</div>
  <div id="final-rank" class="rank-title" style="font-size:16px; margin-top:12px;">NOVATO</div>
  <button class="btn" id="retryBtn">REINTENTAR</button>
  <button class="btn secondary" id="statsBtn2">VER PROGRESO</button>
</div>

<div id="instructions">🖱️ MANTÉN PRESIONADO Y ARRASTRA PARA GUIAR LA ESFERA</div>

<script>
(function() {
  'use strict';
  
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
  let W = 800, H = 600, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // AUDIO
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch(e) {}
    }
  }
  function playTone(freq, dur, type='sine', vol=0.08) {
    if (!audioCtx) return;
    try {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.connect(g).connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }
  const SFX = {
    collect: () => { playTone(523, 0.1); setTimeout(()=>playTone(659, 0.1), 40); setTimeout(()=>playTone(784, 0.15, 'sine', 0.06), 80); },
    bounce: () => playTone(400, 0.08, 'triangle', 0.05),
    death: () => { playTone(220, 0.35, 'sawtooth', 0.08); playTone(150, 0.4, 'sine', 0.06); },
    levelUp: () => { [440,554,659,880].forEach((f,i)=>setTimeout(()=>playTone(f, 0.12, 'sine', 0.06), i*60)); },
    pulse: () => playTone(320, 0.05, 'sine', 0.02)
  };

  // PERSISTENT STATS
  const defaultStats = { levels: 0, bestCombo: 0, totalStars: 0, totalScore: 0, bestLevel: 0 };
  let stats = JSON.parse(localStorage.getItem('aura_stats')) || defaultStats;
  
  function saveStats() { localStorage.setItem('aura_stats', JSON.stringify(stats)); }
  
  const RANKS = [
    { min: 0, title: 'NOVATO', color: '#888' },
    { min: 3, title: 'EXPLORADOR', color: '#4facfe' },
    { min: 8, title: 'ARTISTA', color: '#ff6bca' },
    { min: 15, title: 'MAESTRO', color: '#ffd700' },
    { min: 25, title: 'LEYENDA', color: '#ff4d4d' }
  ];
  function getRank(level) {
    let r = RANKS[0];
    for(let rk of RANKS) if(level >= rk.min) r = rk;
    return r;
  }
  function updateRankUI() {
    const r = getRank(stats.bestLevel);
    document.getElementById('rank-badge').textContent = r.title;
    document.getElementById('rank-badge').style.color = r.color;
    document.getElementById('rank-badge').style.borderColor = r.color + '40';
    document.getElementById('menu-rank').textContent = r.title;
    document.getElementById('menu-rank').style.color = r.color;
  }
  updateRankUI();

  // GAME STATE
  const game = {
    state: 'menu', level: 1, score: 0, combo: 0, comboTimer: 0,
    levelTrans: 0, shake: 0, slowMo: 1, hue: 220, hueTarget: 220,
    timer: 0, totalStars: 5, collectedStars: 0,
    trailBounces: 0
  };

  // PLAYER
  const player = { x: 0, y: 0, vx: 0, vy: 0, r: 11, trail: [], maxTrail: 80, alive: true, phase: 0, glow: 1 };
  let stars = [], obstacles = [], platforms = [], particles = [], bgP = [], trailSegs = [];
  const input = { active: false, x: 0, y: 0 };

  function handleStart(x,y) { initAudio(); input.active = true; input.x = x; input.y = y; if(game.state==='playing') SFX.pulse(); }
  function handleMove(x,y) { if(input.active) { input.x = x; input.y = y; } }
  function handleEnd() { input.active = false; }

  canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
  canvas.addEventListener('touchend', e => { e.preventDefault(); handleEnd(); }, {passive:false});
  canvas.addEventListener('mousedown', e => { e.preventDefault(); handleStart(e.clientX, e.clientY); });
  canvas.addEventListener('mousemove', e => { e.preventDefault(); handleMove(e.clientX, e.clientY); });
  canvas.addEventListener('mouseup', e => { e.preventDefault(); handleEnd(); });
  canvas.addEventListener('mouseleave', handleEnd);

  function formatTime(s) { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }
  function updateObjective() {
    document.getElementById('objective').innerHTML = `⭐ <span>${game.collectedStars}</span> / ${game.totalStars} estrellas`;
    document.getElementById('progress-bar').style.width = `${(game.collectedStars/game.totalStars)*100}%`;
  }

  function genLevel(lvl) {
    stars = []; obstacles = []; platforms = []; particles = []; trailSegs = [];
    player.x = W * 0.5; player.y = H * 0.35;
    player.vx = 0; player.vy = 0; player.trail = []; player.alive = true; player.glow = 1;
    game.level = lvl; game.combo = 0; game.comboTimer = 0; game.trailBounces = 0;
    game.state = 'playing'; game.levelTrans = 0; game.hueTarget = (220 + lvl * 17) % 360;
    game.timer = 0; game.collectedStars = 0;

    const diff = Math.min(lvl, 40);
    game.totalStars = 3 + Math.floor(diff * 0.5);
    
    // Estrellas: una siempre arriba para forzar uso del rastro
    for(let i=0; i<game.totalStars; i++) {
      const isHigh = i === 0 && lvl > 2; // Primera estrella alta en niveles > 2
      stars.push({ 
        x: 60+Math.random()*(W-120), 
        y: isHigh ? 80+Math.random()*60 : 100+Math.random()*(H*0.5), 
        r: 13+Math.random()*4, col:false, anim:0, ph:Math.random()*6.28, spd:1.5, pulseBoost:1 
      });
    }
    
    const nObs = Math.floor(diff * 0.35);
    for(let i=0; i<nObs; i++) {
      const mov = Math.random() < 0.35;
      obstacles.push({
        x: Math.random()*W, y: 70+Math.random()*(H*0.55),
        w: 40+Math.random()*50, h: 8+Math.random()*8,
        type: mov ? 'mov' : 'stat',
        spdX: mov ? (Math.random()-0.5)*(0.8+diff*0.02) : 0,
        spdY: mov ? (Math.random()-0.5)*0.25 : 0,
        ph: Math.random()*6.28, rot: Math.random()*Math.PI, rotSpd: mov?0:(Math.random()-0.5)*0.01
      });
    }
    
    document.getElementById('level-display').textContent = `NIVEL ${lvl}`;
    updateObjective();
    document.getElementById('timer').textContent = '00:00';
    
    // Mostrar hint del rastro en niveles bajos
    if(lvl <= 3) {
      document.getElementById('trail-hint').classList.add('visible');
      setTimeout(()=> document.getElementById('trail-hint').classList.remove('visible'), 4000);
    }
  }

  function update(dt) {
    if (game.state !== 'playing') return;
    const s = dt * game.slowMo;
    game.timer += dt;
    document.getElementById('timer').textContent = formatTime(game.timer);

    player.phase += s * 2.5;
    player.vy += 420 * s;

    if (input.active) {
      const dx = input.x - player.x, dy = input.y - player.y;
      const d = Math.hypot(dx, dy);
      if (d > 5) {
        const f = Math.min(d * 4.5, 1100);
        player.vx += (dx/d) * f * s;
        player.vy += (dy/d) * f * s;
      }
    }

    player.vx *= 0.94; player.vy *= 0.97;
    const spd = Math.hypot(player.vx, player.vy);
    if (spd > 550) { player.vx = (player.vx/spd)*550; player.vy = (player.vy/spd)*550; }

    player.x += player.vx * s; player.y += player.vy * s;

    player.trail.unshift({x: player.x, y: player.y, t: 0});
    if (player.trail.length > player.maxTrail) player.trail.pop();
    for(let p of player.trail) p.t += s;

    // Walls
    if (player.x < player.r) { player.x = player.r; player.vx *= -0.4; }
    if (player.x > W - player.r) { player.x = W - player.r; player.vx *= -0.4; }
    if (player.y < player.r) { player.y = player.r; player.vy *= -0.4; }
    if (player.y > H + 50) kill();

    // TRAIL COLLISION (Improved & Clear)
    trailSegs = [];
    for(let i=0; i<player.trail.length-3; i+=4) {
      const p1 = player.trail[i], p2 = player.trail[i+4] || player.trail[player.trail.length-1];
      if (p1.t > 1.2) {
        const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
        const len = Math.hypot(p2.x-p1.x, p2.y-p1.y) + 8;
        trailSegs.push({x: mx, y: my, w: len, h: 8, a: Math.max(0, 1 - p1.t/6)});
        
        // Bounce detection
        if (Math.abs(player.y - my) < 18 && Math.abs(player.x - mx) < len/2 && player.vy > 0) {
          player.y = my - 4 - player.r;
          player.vy = -player.vy * 0.75;
          player.glow = Math.min(player.glow + 0.4, 2.2);
          game.trailBounces++;
          SFX.bounce();
          spawnP(player.x, player.y + player.r, 6, 0, 2); // White sparks
        }
      }
    }

    for(let o of obstacles) {
      let ox = o.x, oy = o.y;
      if (o.type === 'mov') { o.ph += s*1.8; ox += Math.sin(o.ph)*o.spdX*40; oy += Math.cos(o.ph)*o.spdY*20; }
      else o.rot += o.rotSpd;
      if (Math.abs(player.x - ox) < (o.w/2 + player.r - 2) && Math.abs(player.y - oy) < (o.h/2 + player.r - 2)) kill();
    }

    let allCol = true;
    for(let star of stars) {
      if (star.col) { if(star.anim>0) star.anim -= 0.04; continue; }
      allCol = false; star.ph += star.spd * s;
      const dist = Math.hypot(player.x - star.x, player.y - star.y);
      star.pulseBoost = 1 + Math.max(0, 1 - dist/180) * 0.6;
      
      if (dist < player.r + star.r) {
        star.col = true; star.anim = 1;
        game.collectedStars++;
        game.combo++; game.comboTimer = 1.5;
        const mul = Math.min(game.combo, 12);
        game.score += 100 * mul;
        SFX.collect();
        spawnP(star.x, star.y, 18, game.hue + 25, 4);
        game.shake = 3;
        document.getElementById('score-display')?.textContent = game.score;
        updateObjective();
        const cEl = document.getElementById('combo-display');
        if(game.combo > 1) { cEl.textContent = `COMBO x${game.combo}`; cEl.classList.add('visible'); }
      }
    }
    if (game.comboTimer > 0) { game.comboTimer -= dt; if(game.comboTimer <= 0) { game.combo = 0; document.getElementById('combo-display').classList.remove('visible'); } }

    if (allCol && game.state === 'playing') {
      game.state = 'transition'; game.levelTrans = 1; SFX.levelUp();
      for(let i=0; i<40; i++) setTimeout(()=>spawnP(Math.random()*W, Math.random()*H, 3, Math.random()*360, 4), i*20);
      setTimeout(()=>genLevel(game.level + 1), 1200);
    }

    player.glow = Math.max(1, player.glow - dt * 0.5);
    game.hue += (game.hueTarget - game.hue) * dt * 0.3;
  }

  function kill() {
    if (!player.alive) return; player.alive = false;
    game.shake = 10; game.slowMo = 0.2; SFX.death();
    spawnP(player.x, player.y, 35, game.hue, 5);
    
    // Save stats
    if (game.level > stats.bestLevel) stats.bestLevel = game.level;
    if (game.combo > stats.bestCombo) stats.bestCombo = game.combo;
    stats.totalStars += game.collectedStars;
    stats.totalScore += game.score;
    stats.levels = Math.max(stats.levels, game.level - 1);
    saveStats();
    updateRankUI();

    setTimeout(() => {
      game.state = 'dead'; game.slowMo = 1;
      document.getElementById('finalScore').textContent = game.score;
      document.getElementById('finalMeta').textContent = `Nivel ${game.level} · ${formatTime(game.timer)} · Rebotes: ${game.trailBounces}`;
      const r = getRank(stats.bestLevel);
      document.getElementById('final-rank').textContent = r.title;
      document.getElementById('final-rank').style.color = r.color;
      document.getElementById('gameover').classList.add('visible');
    }, 700);
  }

  function spawnP(x,y,n,hue,spd) {
    for(let i=0; i<n; i++) {
      const a = Math.random()*Math.PI*2, v = Math.random()*spd;
      particles.push({x,y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:1, dec:0.018+Math.random()*0.02, r:1+Math.random()*2.5, h:hue});
    }
  }
  function initBg() { bgP = []; for(let i=0;i<35;i++) bgP.push({x:Math.random()*W, y:Math.random()*H, r:0.8+Math.random()*1.5, a:0.1+Math.random()*0.25, vx:(Math.random()-0.5)*0.25, vy:-0.08-Math.random()*0.3, ph:Math.random()*6.28}); }
  initBg();

  function updateP(dt) {
    for(let i=particles.length-1; i>=0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 40*dt; p.life -= p.dec;
      if(p.life <= 0) particles.splice(i, 1);
    }
    for(let p of bgP) {
      p.x += p.vx; p.y += p.vy; p.ph += dt*1.5;
      if(p.y < -10) { p.y = H+10; p.x = Math.random()*W; }
      if(p.x < -10 || p.x > W+10) p.x = (p.x<0?W+10:-10);
    }
  }

  function rr(ctx, x,y,w,h,r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  function render() {
    ctx.save();
    if(game.shake > 0) { ctx.translate((Math.random()-0.5)*game.shake, (Math.random()-0.5)*game.shake); game.shake *= 0.85; if(game.shake<0.1) game.shake=0; }

    if (!isFinite(W) || !isFinite(H) || W <= 0 || H <= 0) { W = window.innerWidth || 800; H = window.innerHeight || 600; }

    const bg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.85);
    bg.addColorStop(0, `hsl(${game.hue},22%,6%)`); bg.addColorStop(1, `hsl(${(game.hue+30)%360},15%,2%)`);
    ctx.fillStyle = bg; ctx.fillRect(-20,-20,W+40,H+40);

    ctx.strokeStyle = `hsla(${game.hue},20%,30%,0.04)`; ctx.lineWidth=1;
    for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    if(game.state!=='menu') {
      for(let p of bgP){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${p.a*(0.4+0.6*Math.sin(p.ph))})`;ctx.fill();}

      for(let o of obstacles){ctx.save();let ox=o.x, oy=o.y; if(o.type==='mov'){ox+=Math.sin(o.ph)*o.spdX*40; oy+=Math.cos(o.ph)*o.spdY*20;} else ctx.rotate(o.rot);
        ctx.translate(ox,oy);ctx.fillStyle='rgba(255,60,60,0.6)';ctx.shadowColor='rgba(255,60,60,0.6)';ctx.shadowBlur=12;rr(ctx,-o.w/2,-o.h/2,o.w,o.h,4);ctx.fill();
        ctx.fillStyle='rgba(255,100,100,0.2)';rr(ctx,-o.w/2+2,-o.h/2+2,o.w-4,o.h-4,3);ctx.fill();ctx.restore();}

      // TRAIL RENDERING (Clear States)
      if(player.trail.length>1 && player.alive){
        for(let i=1;i<player.trail.length;i++){
          const p1=player.trail[i-1], p2=player.trail[i], age=p1.t, al=Math.max(0,1-age/6);
          const solid = age>1.2;
          ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
          if(solid) {
            // SOLID: Bright cyan, thicker, glowing
            ctx.strokeStyle = `rgba(0, 242, 254, ${al * 0.8})`;
            ctx.lineWidth = 7 * al;
            ctx.shadowColor = `rgba(0, 242, 254, ${al})`;
            ctx.shadowBlur = 15 * al;
          } else {
            // FRESH: Faint white/blue, thin
            ctx.strokeStyle = `rgba(150, 200, 255, ${al * 0.3})`;
            ctx.lineWidth = 3 * al;
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
          }
          ctx.stroke(); ctx.shadowBlur=0;
        }
      }

      // Guide line to closest star
      let closest = null, cDist = Infinity;
      for(let s of stars) { if(!s.col) { const d=Math.hypot(player.x-s.x, player.y-s.y); if(d<cDist){cDist=d; closest=s;} } }
      if(closest) {
        const alpha = Math.max(0, 0.12 - cDist/2500);
        ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(closest.x, closest.y);
        ctx.strokeStyle = `rgba(255,215,0,${alpha})`; ctx.lineWidth=2; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
      }

      for(let s of stars){
        if(s.col){if(s.anim>0){s.anim-=0.03;ctx.beginPath();ctx.arc(s.x,s.y,s.r*(1+(1-s.anim)*2.5),0,Math.PI*2);ctx.fillStyle=`hsla(${game.hue+25},70%,65%,${s.anim})`;ctx.fill();}continue;}
        const pu = (0.8+0.2*Math.sin(s.ph)) * s.pulseBoost;
        const r = s.r * pu;
        ctx.beginPath();ctx.arc(s.x,s.y,r*2.5,0,Math.PI*2);ctx.fillStyle=`hsla(${game.hue+30},80%,60%,0.12)`;ctx.fill();
        ctx.beginPath();ctx.arc(s.x,s.y,r,0,Math.PI*2);
        const sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,r);
        sg.addColorStop(0,`hsla(${game.hue+30},90%,95%,0.95)`);sg.addColorStop(1,`hsla(${game.hue+30},70%,50%,0)`);
        ctx.fillStyle=sg;ctx.shadowColor=`hsla(${game.hue+30},80%,60%,0.8)`;ctx.shadowBlur=22;ctx.fill();ctx.shadowBlur=0;
        ctx.save();ctx.translate(s.x,s.y);ctx.rotate(s.ph*0.4);ctx.beginPath();ctx.moveTo(0,-r*0.5);ctx.lineTo(r*0.35,0);ctx.lineTo(0,r*0.5);ctx.lineTo(-r*0.35,0);ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();ctx.restore();
      }

      if(player.alive && isFinite(player.x)){
        const pu=1+0.08*Math.sin(player.phase), r=player.r*pu, ar=r*3.5*player.glow;
        ctx.beginPath();ctx.arc(player.x,player.y,ar,0,Math.PI*2);
        const ag=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,ar);
        ag.addColorStop(0,`hsla(${game.hue},50%,70%,0.15)`);ag.addColorStop(1,'transparent');
        ctx.fillStyle=ag;ctx.fill();
        ctx.beginPath();ctx.arc(player.x,player.y,r,0,Math.PI*2);
        const pg=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,r);
        pg.addColorStop(0,'#fff');pg.addColorStop(0.4,`hsl(${game.hue},50%,85%)`);pg.addColorStop(1,`hsl(${game.hue},60%,60%)`);
        ctx.fillStyle=pg;ctx.shadowColor=`hsl(${game.hue},70%,65%)`;ctx.shadowBlur=25*player.glow;ctx.fill();ctx.shadowBlur=0;
        ctx.beginPath();ctx.arc(player.x-r*0.2,player.y-r*0.2,r*0.3,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();
      }

      if(game.state==='transition' && game.levelTrans>0){
        game.levelTrans -= 0.015;
        ctx.fillStyle=`rgba(255,255,255,${game.levelTrans*0.15})`;ctx.fillRect(-20,-20,W+40,H+40);
        ctx.save();ctx.globalAlpha=game.levelTrans;ctx.fillStyle='#ffd700';ctx.font=`bold 26px system-ui`;ctx.textAlign='center';
        ctx.fillText(`¡NIVEL ${game.level}!`, W/2, H/2-5);
        ctx.fillStyle='#fff';ctx.font=`14px system-ui`;ctx.fillText(`⭐ ${game.collectedStars} · ⏱️ ${formatTime(game.timer)}`, W/2, H/2+20);
        ctx.restore();
      }

      for(let p of particles){
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.h},70%,65%,${p.life})`;ctx.fill();
      }

      const vig=ctx.createRadialGradient(W/2,H/2,W*0.2,W/2,H/2,W);
      vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(0,0,0,0.5)');
      ctx.fillStyle=vig;ctx.fillRect(-20,-20,W+40,H+40);
    }
    ctx.restore();
  }

  let last=0, hidden=false;
  function loop(t){
    const dt = Math.min((t-last)/1000, 0.04); last=t;
    if(!hidden){
      if(game.state==='playing') update(dt);
      updateP(dt);
      if(game.slowMo<1){game.slowMo+=dt*0.8; if(game.slowMo>1)game.slowMo=1;}
      render();
    }
    requestAnimationFrame(loop);
  }
  document.addEventListener('visibilitychange', ()=>{hidden=document.hidden;});
  requestAnimationFrame(loop);

  // UI BUTTONS
  document.getElementById('startBtn').addEventListener('click', ()=>{
    game.state='playing'; game.score=0;
    document.getElementById('menu').classList.add('hidden');
    genLevel(1);
  });
  document.getElementById('retryBtn').addEventListener('click', ()=>{
    game.state='playing'; game.score=0;
    document.getElementById('combo-display').classList.remove('visible');
    document.getElementById('gameover').classList.remove('visible');
    genLevel(1);
  });
  
  // STATS SCREEN
  function showStats() {
    document.getElementById('stats-content').innerHTML = `
      <div class="stat-box"><div class="stat-val">${stats.bestLevel}</div><div class="stat-label">MEJOR NIVEL</div></div>
      <div class="stat-box"><div class="stat-val">${stats.totalStars}</div><div class="stat-label">ESTRELLAS</div></div>
      <div class="stat-box"><div class="stat-val">${stats.bestCombo}</div><div class="stat-label">MEJOR COMBO</div></div>
      <div class="stat-box"><div class="stat-val">${stats.totalScore}</div><div class="stat-label">PUNTOS TOTALES</div></div>
    `;
    document.getElementById('stats-screen').classList.remove('hidden');
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('gameover').classList.remove('visible');
  }
  document.getElementById('statsBtn').addEventListener('click', showStats);
  document.getElementById('statsBtn2').addEventListener('click', showStats);
  document.getElementById('closeStatsBtn').addEventListener('click', ()=>{
    document.getElementById('stats-screen').classList.add('hidden');
    if(game.state === 'menu') document.getElementById('menu').classList.remove('hidden');
  });
})();
</script>
</body>
