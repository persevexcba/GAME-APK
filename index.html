<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunset Glide: Malibu Run</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 800px;
            max-height: 600px;
            background: linear-gradient(180deg, #ff6b35 0%, #f7931e 25%, #fdb833 50%, #f72585 75%, #7209b7 100%);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 107, 53, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #multiplier {
            font-size: 18px;
            color: #fdb833;
        }

        #flowBar {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 150px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #fdb833;
            border-radius: 10px;
            overflow: hidden;
        }

        #flowFill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #fdb833);
            width: 100%;
            transition: width 0.1s;
        }

        #gameOverScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            color: white;
        }

        #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #fdb833;
            text-shadow: 0 0 20px rgba(253, 184, 51, 0.8);
        }

        #gameOverScreen p {
            font-size: 24px;
            margin-bottom: 10px;
        }

        #gameOverScreen button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #fdb833;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        #gameOverScreen button:hover {
            background: #ff6b35;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.8);
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            font-size: 12px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            text-align: right;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div id="score">Score: 0</div>
            <div id="multiplier">Multiplier: 1x</div>
        </div>
        <div id="flowBar">
            <div id="flowFill"></div>
        </div>
        <div id="instructions">
            <p>SPACE: Ollie | ← →: Rotate | Mobile: Tap sides</p>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p id="finalScore">Final Score: 0</p>
            <p id="bestMultiplier">Best Multiplier: 1x</p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        // Canvas Setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        // Game Variables
        let score = 0;
        let multiplier = 1;
        let flow = 50; // 0-100
        let gameRunning = true;
        let gameSpeed = 5;
        let baseSpeed = 5;
        let difficulty = 0;

        // Player
        const player = {
            lane: 1, // 0, 1, 2
            x: canvas.width / 2,
            y: canvas.height - 80,
            width: 30,
            height: 40,
            isJumping: false,
            jumpVelocity: 0,
            rotation: 0,
            targetRotation: 0,
            inAir: false,
            airTime: 0
        };

        // Lanes
        const lanes = [
            canvas.width / 2 - 150,
            canvas.width / 2,
            canvas.width / 2 + 150
        ];

        // Obstacles
        let obstacles = [];
        let obstacleSpawnCounter = 0;

        // Input
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                performOllie();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mobile Touch
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches;
            const rect = canvas.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            
            if (touchX < canvas.width / 3) {
                keys['ArrowLeft'] = true;
            } else if (touchX > (canvas.width * 2) / 3) {
                keys['ArrowRight'] = true;
            } else {
                performOllie();
            }
        });
        canvas.addEventListener('touchend', () => {
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
        });

        function performOllie() {
            if (!player.isJumping) {
                player.isJumping = true;
                player.jumpVelocity = 15;
                player.inAir = true;
                player.airTime = 0;
                playSound('jump');
            }
        }

        function updatePlayer() {
            // Lane Movement
            if (keys['ArrowLeft'] && player.lane > 0) {
                player.lane--;
                keys['ArrowLeft'] = false;
            }
            if (keys['ArrowRight'] && player.lane < 2) {
                player.lane++;
                keys['ArrowRight'] = false;
            }

            player.x = lanes[player.lane];

            // Jump Physics
            if (player.isJumping) {
                player.jumpVelocity -= 0.6; // Gravity
                player.y -= player.jumpVelocity;
                player.airTime++;

                // Rotation while in air
                if (keys['ArrowLeft']) {
                    player.targetRotation -= 15;
                }
                if (keys['ArrowRight']) {
                    player.targetRotation += 15;
                }

                if (player.y >= canvas.height - 80) {
                    player.y = canvas.height - 80;
                    player.isJumping = false;
                    player.jumpVelocity = 0;

                    // Landing
                    if (player.airTime > 10) {
                        // Successful trick
                        const trickBonus = Math.floor(player.airTime / 5) * 10;
                        score += trickBonus * multiplier;
                        flow = Math.min(100, flow + 15);
                        multiplier += 0.2;
                        playSound('land');
                    }
                    player.airTime = 0;
                    player.inAir = false;
                }
            } else {
                player.targetRotation *= 0.95; // Smooth rotation reset
            }

            player.rotation += (player.targetRotation - player.rotation) * 0.1;

            // Flow Management
            if (player.inAir) {
                flow -= 0.5;
            } else {
                flow = Math.max(0, flow - 0.2);
            }

            if (flow <= 0) {
                gameSpeed = baseSpeed * 0.5;
                multiplier = Math.max(1, multiplier - 0.05);
            } else {
                gameSpeed = baseSpeed + (flow / 100) * 5;
            }
        }

        function spawnObstacle() {
            const types = ['car', 'car', 'car', 'pedestrian', 'pothole'];
            const type = types[Math.floor(Math.random() * types.length)];
            const lane = Math.floor(Math.random() * 3);

            obstacles.push({
                x: lanes[lane],
                y: -50,
                width: 40,
                height: 50,
                lane: lane,
                type: type,
                passed: false
            });
        }

        function updateObstacles() {
            obstacleSpawnCounter++;
            const spawnRate = Math.max(40, 100 - difficulty * 2);

            if (obstacleSpawnCounter > spawnRate) {
                spawnObstacle();
                obstacleSpawnCounter = 0;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += gameSpeed;

                // Check collision
                if (checkCollision(player, obstacles[i])) {
                    endGame();
                }

                // Check if passed
                if (!obstacles[i].passed && obstacles[i].y > player.y) {
                    obstacles[i].passed = true;
                    score += 5 * multiplier;
                    flow = Math.min(100, flow + 5);
                }

                // Remove if off-screen
                if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                }
            }

            difficulty = Math.floor(score / 500);
        }

        function checkCollision(player, obstacle) {
            return (
                player.x - player.width / 2 < obstacle.x + obstacle.width / 2 &&
                player.x + player.width / 2 > obstacle.x - obstacle.width / 2 &&
                player.y - player.height / 2 < obstacle.y + obstacle.height / 2 &&
                player.y + player.height / 2 > obstacle.y - obstacle.height / 2
            );
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate((player.rotation * Math.PI) / 180);

            // Skateboard
            ctx.fillStyle = '#ff6b35';
            ctx.fillRect(-20, -5, 40, 10);

            // Wheels
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-15, 8, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(15, 8, 5, 0, Math.PI * 2);
            ctx.fill();

            // Player body (circle)
            ctx.fillStyle = '#fdb833';
            ctx.beginPath();
            ctx.arc(0, -15, 10, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(-4, -18, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(4, -18, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Speed lines
            if (gameSpeed > 7) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(player.x - 50, player.y + i * 10 - 15);
                    ctx.lineTo(player.x - 80, player.y + i * 10 - 15);
                    ctx.stroke();
                }
            }
        }

        function drawObstacles() {
            obstacles.forEach((obstacle) => {
                if (obstacle.type === 'car') {
                    ctx.fillStyle = ['#ff6b35', '#f7931e', '#7209b7'] [Math.random() * 3 | 0];
                    ctx.fillRect(obstacle.x - obstacle.width / 2, obstacle.y - obstacle.height / 2, obstacle.width, obstacle.height);
                    ctx.fillStyle = '#333';
                    ctx.fillRect(obstacle.x - obstacle.width / 2 + 5, obstacle.y - obstacle.height / 2 + 5, obstacle.width - 10, 10);
                } else if (obstacle.type === 'pedestrian') {
                    ctx.fillStyle = '#f72585';
                    ctx.fillRect(obstacle.x - 10, obstacle.y - obstacle.height / 2, 20, obstacle.height);
                    ctx.fillStyle = '#fdb833';
                    ctx.beginPath();
                    ctx.arc(obstacle.x, obstacle.y - obstacle.height / 2 - 10, 8, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obstacle.type === 'pothole') {
                    ctx.fillStyle = '#333';
                    ctx.beginPath();
                    ctx.arc(obstacle.x, obstacle.y, 15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#666';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        function drawRoad() {
            // Road lines
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 3;
            ctx.setLineDash([20, 20]);

            for (let i = 0; i < 2; i++) {
                ctx.beginPath();
                ctx.moveTo(lanes[i] + 75, 0);
                ctx.lineTo(lanes[i] + 75, canvas.height);
                ctx.stroke();
            }

            ctx.setLineDash([]);
        }

        function drawHUD() {
            document.getElementById('score').textContent = `Score: ${Math.floor(score)}`;
            document.getElementById('multiplier').textContent = `Multiplier: ${multiplier.toFixed(1)}x`;
            document.getElementById('flowFill').style.width = `${flow}%`;
        }

        function playSound(type) {
            // Simple beep sounds using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            if (type === 'jump') {
                oscillator.frequency.value = 400;
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } else if (type === 'land') {
                oscillator.frequency.value = 600;
                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.15);
            }
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = `Final Score: ${Math.floor(score)}`;
            document.getElementById('bestMultiplier').textContent = `Best Multiplier: ${multiplier.toFixed(1)}x`;
            playSound('crash');
        }

        function gameLoop() {
            if (!gameRunning) return;

            // Clear canvas with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#ff6b35');
            gradient.addColorStop(0.25, '#f7931e');
            gradient.addColorStop(0.5, '#fdb833');
            gradient.addColorStop(0.75, '#f72585');
            gradient.addColorStop(1, '#7209b7');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw
            drawRoad();
            updatePlayer();
            updateObstacles();
            drawObstacles();
            drawPlayer();
            drawHUD();

            requestAnimationFrame(gameLoop);
        }

        // Start Game
        gameLoop();
    </script>
</body>
</html>
